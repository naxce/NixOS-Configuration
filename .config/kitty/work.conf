include kitty.conf

# =========================
# VISUAL — CLEAN DAILY
# =========================

# trochę mniej „glass”, więcej czytelności
background_opacity 0.98
background_blur 0

window_padding_width 6
window_margin_width 2

# ramki subtelniejsze
window_border_width 1pt
active_border_color #89b4fa
inactive_border_color #2a2f3a
draw_minimal_borders yes

# =========================
# WINDOW CHROME (TITLEBAR)
# =========================

# WŁĄCZAMY DEKORACJE (to co chciałeś)
hide_window_decorations no
draw_window_title yes
window_decorations full

# =========================
# FONT — REAL UPGRADE
# =========================

font_family JetBrains Mono Nerd Font
font_size 11.5

bold_font auto
italic_font auto
disable_ligatures never

# poprawa czytelności fontów
font_features JetBrainsMonoNerdFont-Regular +zero +ss01 +cv02

# =========================
# KURSOR
# =========================

cursor_shape beam
cursor_blink_interval 0
cursor #89b4fa
cursor_text_color #0a0f18

# =========================
# UX / PRACA
# =========================

confirm_os_window_close 0
enable_audio_bell no
remember_window_size yes

scrollback_lines 15000
wheel_scroll_multiplier 5.0

copy_on_select yes
strip_trailing_spaces smart

# =========================
# RESPONSYWNOŚĆ
# =========================

repaint_delay 10
input_delay 3
sync_to_monitor yes

# Wayland
linux_display_server wayland

# Shell integration
shell_integration no-rc

# =========================
# TABS — SUBTLE
# =========================

tab_bar_edge top
tab_bar_style fade
tab_fade 0.25 0.6 0.9

# =========================
# SHORTCUTS
# =========================

map ctrl+shift+enter new_window
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+shift+q close_window

# splits
map ctrl+alt+v launch --location=vsplit
map ctrl+alt+h launch --location=hsplit

# navigation
map ctrl+alt+left neighboring_window left
map ctrl+alt+right neighboring_window right
map ctrl+alt+up neighboring_window up
map ctrl+alt+down neighboring_window down

# resize
map ctrl+shift+left resize_window narrower 5
map ctrl+shift+right resize_window wider 5
map ctrl+shift+up resize_window taller 5
map ctrl+shift+down resize_window shorter 5
