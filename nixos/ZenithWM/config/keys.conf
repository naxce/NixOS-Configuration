# ZenithWM Keybindings
# ~/.config/zenithwm/keys.conf
#
# Format: MOD+KEY = action
# Modifiers: Super (Win), Alt, Ctrl, Shift
# Actions: exec <cmd>, close_window, fullscreen, minimize,
#          show_desktop, workspace <N>, move_to_workspace <N>
#
# Reload: pkill -USR1 zenithwm

# Applications
Super+Return        = exec foot
Super+r             = exec fuzzel

# Window management
Super+q             = close_window
Super+f             = fullscreen
Super+m             = minimize
Super+d             = show_desktop

# Workspaces (9 available)
Super+1             = workspace 1
Super+2             = workspace 2
Super+3             = workspace 3
Super+4             = workspace 4
Super+5             = workspace 5
Super+6             = workspace 6
Super+7             = workspace 7
Super+8             = workspace 8
Super+9             = workspace 9

# Move focused window to workspace
Super+Shift+1       = move_to_workspace 1
Super+Shift+2       = move_to_workspace 2
Super+Shift+3       = move_to_workspace 3
Super+Shift+4       = move_to_workspace 4
Super+Shift+5       = move_to_workspace 5