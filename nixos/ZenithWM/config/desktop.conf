# ZenithWM Desktop Icons
# ~/.config/zenithwm/desktop.conf
#
# Add an [icon] block for each desktop shortcut.
# icon = path to PNG/SVG or a named icon from your icon theme
# x, y = pixel position from top-left of primary monitor

[icon]
name = Steam
exec = steam
icon = steam
x = 30
y = 50

[icon]
name = Terminal
exec = foot
icon = foot
x = 30
y = 130

[icon]
name = Files
exec = thunar
icon = system-file-manager
x = 30
y = 210