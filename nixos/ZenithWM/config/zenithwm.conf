# ZenithWM Main Configuration
# ~/.config/zenithwm/zenithwm.conf
#
# Reload: pkill -USR1 zenithwm

[compositor]
# VRR / FreeSync / G-Sync
adaptive_sync = true

# VSync: false = low latency (may tear), true = no tearing
vsync = false

# XWayland: needed for older games (Steam via Proton works without it on native)
xwayland = true

# Window border in pixels. Set 0 to disable.
border_width = 1
border_color = #333333

[performance]
# Disable all window animations for minimum overhead
no_animations = true

# Informational hint — set your CPU governor via your system:
#   echo performance | sudo tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor
governor_hint = performance

[apps]
# Terminal launched with Super+Return
terminal = foot